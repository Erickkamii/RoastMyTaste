spring:
  application:
    name: roast-my-taste
  threads:
    virtual:
      enabled: true
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai/v1
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.7
  security:
    oauth2:
      client:
        registration:
          spotify:
            client-id: ${SPOTIFY_CLIENT_ID}
            client-secret: ${SPOTIFY_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "${SPOTIFY_REDIRECT_URI:http://localhost:8080/login/oauth2/code/spotify}"
            scope:
              - user-top-read
        provider:
          spotify:
            authorization-uri: https://accounts.spotify.com/authorize
            token-uri: https://accounts.spotify.com/api/token
            user-info-uri: https://api.spotify.com/v1/me
            user-name-attribute: id
  mvc:
    problemdetails:
      enabled: true

spotify:
  api:
    base-url: https://api.spotify.com/v1

jwt:
  secret: ${JWT_SECRET:umaChaveMuitoLongaESeguraComPeloMenos32Caracteres123456}
  expiration: 86400000 # 24 horas em milissegundos

app:
  frontend-url: ${FRONTEND_URL:https://roast-my-taste-demo.vercel.app}

server:
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        path: /
        same-site: none
        secure: true
        http-only: true

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: TRACE
    org.springframework.session: TRACE